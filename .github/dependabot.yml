version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      nuxt-ecosystem:
        patterns:
          - nuxt
          - '@nuxt/*'
          - nitropack
      firebase:
        patterns:
          - firebase
          - firebase-admin
      security-patches:
        patterns:
          - '*'
        update-types:
          - patch
